[tool.black]
line-length = 88
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
  | node_modules
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = ["venv", ".venv", "node_modules"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
exclude = ["venv", ".venv", "node_modules", "__pycache__"]
ignore = ["E203"]
